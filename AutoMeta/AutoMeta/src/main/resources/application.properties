spring.application.name=AutoMeta
# server.port=8080

# YouTube API Config (from environment variables)
youtube.api.key=${YOUTUBE_API_KEY}
youtube.api.base.url=${YOUTUBE_API_BASE_URL:https://www.googleapis.com/youtube/v3}
youtube.api.search.url=${youtube.api.base.url}/search
youtube.api.videos.url=${youtube.api.base.url}/videos
youtube.api.max.related.videos=${YOUTUBE_API_MAX_RELATED_VIDEOS:3}